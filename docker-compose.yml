version: "3.9"

# ─── NovelWorld 微服务编排 ────────────────────────────────────────────────────
# 服务拓扑：
#   nginx (80/443) → gateway (8080) → [novel-service, agent-service,
#                                       narrative-service, user-service]
#   所有服务共享 postgres18 + redis

networks:
  novel-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:

services:

  # ─── 基础设施 ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    container_name: novel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novel_secret}
      POSTGRES_DB: ${POSTGRES_DB:-novel_world}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5432:5432"
    networks:
      - novel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novel} -d ${POSTGRES_DB:-novel_world}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: novel-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - novel-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 微服务 ────────────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: novel-user-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD:-novel_secret}@postgres:5432/${POSTGRES_DB:-novel_world}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_32chars}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      PORT: 8001
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - novel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  novel-service:
    build:
      context: ./services/novel-service
      dockerfile: Dockerfile
    container_name: novel-novel-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD:-novel_secret}@postgres:5432/${POSTGRES_DB:-novel_world}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      IMAGE_GEN_API_URL: ${IMAGE_GEN_API_URL:-https://api.openai.com/v1}
      IMAGE_GEN_API_KEY: ${IMAGE_GEN_API_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-novel-world}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      PORT: 8002
      RUST_LOG: info
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    container_name: novel-agent-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD:-novel_secret}@postgres:5432/${POSTGRES_DB:-novel_world}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      # 记忆层配置
      MEMORY_SHORT_TERM_LIMIT: ${MEMORY_SHORT_TERM_LIMIT:-20}
      MEMORY_MID_TERM_LIMIT: ${MEMORY_MID_TERM_LIMIT:-50}
      MEMORY_COMPRESS_THRESHOLD: ${MEMORY_COMPRESS_THRESHOLD:-15}
      PORT: 8003
      NOVEL_SERVICE_URL: http://novel-service:8002
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      novel-service:
        condition: service_healthy
    networks:
      - novel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  narrative-service:
    build:
      context: ./services/narrative-service
      dockerfile: Dockerfile
    container_name: novel-narrative-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD:-novel_secret}@postgres:5432/${POSTGRES_DB:-novel_world}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      PORT: 8004
      NOVEL_SERVICE_URL: http://novel-service:8002
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      novel-service:
        condition: service_healthy
    networks:
      - novel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── API Gateway ───────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: novel-gateway
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-service:8001
      NOVEL_SERVICE_URL: http://novel-service:8002
      AGENT_SERVICE_URL: http://agent-service:8003
      NARRATIVE_SERVICE_URL: http://narrative-service:8004
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_32chars}
      GATEWAY_PORT: 8080
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:80}
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_healthy
      novel-service:
        condition: service_healthy
      agent-service:
        condition: service_healthy
      narrative-service:
        condition: service_healthy
    networks:
      - novel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── 前端 ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: novel-frontend
    restart: unless-stopped
    networks:
      - novel-net

  # ─── Nginx 反向代理 ────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: novel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - gateway
      - frontend
    networks:
      - novel-net
