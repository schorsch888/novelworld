version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/gateway"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/user-service"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/novel-service"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/agent-service"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/narrative-service"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "monthly"
