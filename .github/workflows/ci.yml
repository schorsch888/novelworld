name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace --exclude integration-tests
      - name: Test
        run: cargo test --workspace --exclude integration-tests
      - name: Clippy
        run: cargo clippy --workspace --exclude integration-tests -- -D warnings
        continue-on-error: true

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Remove pnpm-workspace.yaml if invalid
        run: |
          if [ -f pnpm-workspace.yaml ] && ! grep -q "packages:" pnpm-workspace.yaml; then
            rm pnpm-workspace.yaml
          fi
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm type-check
      - run: pnpm build
